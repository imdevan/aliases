# General
editor = "nvim"

# CLI behavior
interactive_default = false
confirm_delete = true  # Prompt for confirmation before deleting an alias

# Alias settings
alias_file = "~/.aliases/aliases.zsh"  # File where aliases are stored (extension based on shell)
shell = "zsh"                          # Options: bash, zsh, fish, nu (auto-detected if not specified)
index_folders = []                     # Glob patterns to scan for additional alias files (e.g. ["~/dotfiles/*.zsh"])
cache_interval = 300
script_icons = {}

# Auto-alias generation
auto_alias_separator = ""   # Character between first letters (empty = "mcp", "-" = "m-c-p")
auto_alias_lowercase = true
default_alias_part_length = 1  # Number of characters to take from each part

# Function alias wrapper
# When enabled, adds a shell function that auto-sources aliases after running alias commands
# Options: "true" (use default name "aliases"), "custom_name" (use custom function name), "false" (disabled)
function_alias = "true"

# Interactive alias wrapper
# When enabled, adds a shell function for interactive alias navigation (aliases -i)
# The function displays the TUI and executes the selected alias command
# Options: "al" (default), "custom_name" (use custom function name), "false" (disabled)
interactive_alias = "al"

# Display
home_icon = "~"  # Icon to represent home directory in list view
default_sort_by = "newest"  # Options: newest, oldest, a-z, z-a

# UI
list_spacing = "space" # Options: compact, tight, space

# Colors
headings = "15"
primary = "02"
secondary = "06"
text = "07"
text_highlight = "06"
description_highlight = "05"
tags = "13"
flags = "12"
muted = "08"
border = "08"
error = "01"
